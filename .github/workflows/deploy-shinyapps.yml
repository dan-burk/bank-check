# Deploy the app server-side to shinyapps.io on every push that touches
# app/. Needs three repo secrets (Settings > Secrets and variables >
# Actions), copied from shinyapps.io Account > Tokens:
#   SHINYAPPS_NAME    the shinyapps.io account name
#   SHINYAPPS_TOKEN   the token
#   SHINYAPPS_SECRET  the secret
name: Deploy to shinyapps.io

on:
  push:
    branches: [main]
    paths: ["app/**", ".github/workflows/deploy-shinyapps.yml"]
  workflow_dispatch:

concurrency:
  group: shinyapps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # rsconnect records the packages installed here so shinyapps.io can
      # restore them; the list must cover everything the app loads
      - name: Install app packages
        run: |
          Rscript -e 'install.packages(c("rsconnect", "shiny", "bslib",
            "plotly", "dplyr", "DT", "commonmark", "jsonlite"))'

      - name: Deploy
        env:
          SHINYAPPS_NAME: ${{ secrets.SHINYAPPS_NAME }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          Rscript -e '
            rsconnect::setAccountInfo(
              name   = Sys.getenv("SHINYAPPS_NAME"),
              token  = Sys.getenv("SHINYAPPS_TOKEN"),
              secret = Sys.getenv("SHINYAPPS_SECRET")
            )
            rsconnect::deployApp("app", appName = "bank-check",
                                 forceUpdate = TRUE)
          '
