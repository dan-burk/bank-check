# DORMANT: the app deploys to shinyapps.io now (deploy-shinyapps.yml);
# the wasm cold start was too slow. This workflow still works and can be
# run manually from the Actions tab to refresh the GitHub Pages version.
name: Deploy app to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install shinylive
        run: Rscript -e 'install.packages("shinylive")'

      - name: Export app to static site
        run: Rscript -e 'shinylive::export("app", "_site", template_params = list(title = "Bank Check"))'

      - name: Disable Jekyll, add favicon
        run: |
          touch _site/.nojekyll
          cp favicon.ico _site/favicon.ico

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
