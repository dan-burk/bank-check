# CI and deployment, one pipeline. Every push to main that touches the
# app runs the smoke test first; BOTH deploys — shinyapps.io (primary,
# server-side) and GitHub Pages (shinylive/webR backup) — are blocked
# unless it passes. Pull requests run the test only.
#
# Reproducibility: every job installs R packages as prebuilt binaries
# from the dated Posit Package Manager snapshot in PKG_REPO below, with
# the runner image and R version pinned to match. Same date, same
# binaries, forever — no source compilation in CI, and the versions the
# smoke test validates are the versions that deploy (the UI leans on
# version-sensitive bslib behavior, so "latest CRAN" is not safe).
#
# To upgrade packages: bump the snapshot date in PKG_REPO and in the
# cache keys, push, and let the gate validate the new set.
#
# shinyapps.io needs three repo secrets (Settings > Secrets and variables
# > Actions), copied from shinyapps.io Account > Tokens:
#   SHINYAPPS_NAME    the shinyapps.io account name
#   SHINYAPPS_TOKEN   the token
#   SHINYAPPS_SECRET  the secret
name: Test and deploy

on:
  push:
    branches: [main]
    paths: ["app/**", "DESCRIPTION", ".github/workflows/deploy.yml"]
  pull_request:
    paths: ["app/**", "DESCRIPTION", ".github/workflows/deploy.yml"]
  workflow_dispatch:

permissions:
  contents: read

env:
  # Binary repo for the pinned runner distro (noble = ubuntu-24.04).
  # __linux__ is a literal P3M path segment; it serves noble binaries to
  # R's install.packages and falls back to source where none exists.
  PKG_REPO: "https://packagemanager.posit.co/cran/__linux__/noble/2026-07-15"

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.1"

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: rlib-test-noble-r451-snap20260715-${{ hashFiles('DESCRIPTION') }}

      # The app's direct dependencies come from DESCRIPTION Imports (one
      # list, no drift); install.packages pulls them plus dependencies
      # from the dated snapshot. timeout/warn per idepGolem's
      # install_packages.R: the 60s default flakes on large downloads,
      # and warn = 1 surfaces failed installs where they happen.
      - name: Install pinned packages
        run: |
          Rscript -e '
            options(timeout = 300, warn = 1)
            pkgs <- trimws(strsplit(read.dcf("DESCRIPTION")[, "Imports"], ",")[[1]])
            install.packages(pkgs, repos = Sys.getenv("PKG_REPO"))
          '

      # Runs offline: the shipped .rds copies in app/data/ satisfy every
      # fetch fallback, so FDIC API downtime cannot flake the gate
      - name: Run smoke test
        run: Rscript app/tests/smoke.R

  deploy-shinyapps:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    concurrency:
      group: shinyapps
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.1"

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: rlib-deploy-noble-r451-snap20260715-${{ hashFiles('DESCRIPTION') }}

      # rsconnect records the versions installed here and shinyapps.io
      # restores exactly those, so the snapshot-pinned set is what serves
      # prod — the same set the test job just validated
      - name: Install pinned packages
        run: |
          Rscript -e '
            options(timeout = 300, warn = 1)
            pkgs <- trimws(strsplit(read.dcf("DESCRIPTION")[, "Imports"], ",")[[1]])
            install.packages(c(pkgs, "rsconnect"), repos = Sys.getenv("PKG_REPO"))
          '

      - name: Deploy
        env:
          SHINYAPPS_NAME: ${{ secrets.SHINYAPPS_NAME }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          Rscript -e '
            rsconnect::setAccountInfo(
              name   = Sys.getenv("SHINYAPPS_NAME"),
              token  = Sys.getenv("SHINYAPPS_TOKEN"),
              secret = Sys.getenv("SHINYAPPS_SECRET")
            )
            rsconnect::deployApp("app", appName = "bank-check",
                                 forceUpdate = TRUE)
          '

  # Backup deployment: the serverless in-browser (shinylive/webR) build on
  # GitHub Pages. Slow cold start but no server, no hour caps; it covers
  # visitors when the shinyapps.io deployment sleeps or hits its monthly
  # active-hours limit. Browser-side package versions come from the webR
  # bundle inside the shinylive package (pinned by the same snapshot),
  # not from DESCRIPTION — the smoke-tested R code is what's exported.
  build-pages:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.1"

      - name: Install shinylive
        run: Rscript -e 'options(timeout = 300, warn = 1); install.packages("shinylive", repos = Sys.getenv("PKG_REPO"))'

      - name: Export app to static site
        run: Rscript -e 'shinylive::export("app", "_site", template_params = list(title = "Bank Check"))'

      - name: Disable Jekyll, add favicon
        run: |
          touch _site/.nojekyll
          cp favicon.ico _site/favicon.ico

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy-pages:
    needs: build-pages
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
